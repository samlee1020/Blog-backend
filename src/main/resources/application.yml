server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: blog-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:blog}
    password: ${SPRING_DATASOURCE_PASSWORD:blog_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:12MB}
  flyway:
    enabled: true
    baseline-on-migrate: true

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

app:
  upload-root: ${APP_UPLOAD_ROOT:./data/uploads}
  token-ttl-seconds: ${APP_TOKEN_TTL_SECONDS:604800}
  admin-username: ${APP_ADMIN_USERNAME:admin}
  admin-password: ${APP_ADMIN_PASSWORD:password123}
